services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    restart: unless-stopped
    # No ports exposed: only reachable by other services on the compose network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.production
    depends_on:
      redis:
        condition: service_healthy
    command: ["npm", "run", "start"]
    ports:
      - "446:446"
    volumes:
      - uploads-data:/app/runtime/uploads
    restart: unless-stopped

volumes:
  redis-data:
  uploads-data:
